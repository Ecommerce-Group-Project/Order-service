version: '3.8'

networks:
  order-network:
    driver: bridge

volumes:
  order-db-data:

services:

  order-db:
    image: postgres:16-alpine
    container_name: order-db_standalone
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ecommerce_project
      POSTGRES_PASSWORD: 123456789EP
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_project -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5
