version: '3.8'

networks:
  order-network:
    driver: bridge

volumes:
  order-db-data:

services:
  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: ecommerce_project
      POSTGRES_PASSWORD: 123456789EP
    ports:
      - "5432:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce_project -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: default_user
      RABBITMQ_DEFAULT_PASS: default_pass
    # FIXED: Added to the network so order-service can connect
    networks:
      - order-network
    # FIXED: Added healthcheck so condition: service_healthy works
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: order-service-image:v1
    container_name: order-service-container
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=order-db
      - DB_PORT=5432
      - DB_NAME=order_db
      - DB_SSL_MODE=disable
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - DB_USERNAME=ecommerce_project
      - DB_PASSWORD=123456789EP
      - springdoc.api-docs.enabled=false
      - springdoc.swagger-ui.enabled=false
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=default_user
      - RABBITMQ_PASSWORD=default_pass
    networks:
      - order-network
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy